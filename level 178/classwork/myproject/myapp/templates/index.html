<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% for per in arr %}
        {% if per.age >= 18 %}
            <p>{{ per.name }} {{ per.surname }} is adult </p>
        {% else %}
            <p>{{ per.name }} {{ per.surname }} is not adult </p>   
        {% endif %}
    {% endfor %}
</html>
